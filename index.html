<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>菱形旅程</title>
<style>
  /* Side plus buttons */
  .side-plus {
    position: absolute; z-index: 15;
    width: 28px; height: 28px;
    background: white; border: 2px dashed #bbb;
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    font-size: 18px; color: #999; cursor: pointer;
    transition: all 0.2s;
    opacity: 0; pointer-events: none;
  }
  .tile-wrap:hover .side-plus { opacity: 1; pointer-events: auto; }
  .tile-wrap .side-plus.always-show { opacity: 1; pointer-events: auto; border-color: #2ecc71; color: #2ecc71; background: #eafaf1; }
  .side-plus:hover { border-color: #3498db; color: #3498db; background: #ebf5fb; }
  /* Touch devices: always show corner buttons */
  @media (hover: none) {
    .side-plus { opacity: 0.4; pointer-events: auto; }
    .tile-wrap .side-plus.always-show { opacity: 1; }
  }
  body {
    background: #f5f0e8;
    font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .game-board {
    max-width: 420px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .title {
    font-size: 24px;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: 13px;
    color: #95a5a6;
    margin-bottom: 30px;
  }
  .path {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
    position: relative;
    padding: 10px 0;
  }
  .tile-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    width: 100%;
    margin: -8px 0;
  }
  .tile {
    width: 180px;
    height: 180px;
    transform: rotate(45deg);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    border: 3px solid;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  }
  .tile-inner {
    transform: rotate(-45deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100%;
    height: 100%;
    padding: 10px;
  }
  .tile.start {
    background: linear-gradient(135deg, #fff5e6, #ffe0b2);
    border-color: #f39c12;
  }
  .tile.start .tile-inner { color: #e67e22; }
  .tile.custom {
    background: linear-gradient(135deg, #f0e6ff, #e0ccff);
    border-color: #9b59b6;
  }
  .tile.custom .tile-inner { color: #8e44ad; }
  .tile.completed {
    background: linear-gradient(135deg, #eafaf1, #d5f5e3);
    border-color: #2ecc71;
  }
  .tile.completed .tile-inner { color: #27ae60; }
  .tile.current {
    background: linear-gradient(135deg, #ebf5fb, #d6eaf8);
    border-color: #3498db;
    animation: pulse 2s ease-in-out infinite;
  }
  .tile.current .tile-inner { color: #2980b9; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 15px rgba(52,152,219,0.15); }
    50% { box-shadow: 0 4px 25px rgba(52,152,219,0.35); }
  }
  .tile-icon { font-size: 36px; margin-bottom: 4px; }
  .tile-number { font-size: 11px; font-weight: 700; opacity: 0.6; }
  .tile-name { font-size: 12px; font-weight: 600; margin-top: 2px; }
  .tile.tiny {
    width: 180px;
    height: 180px;
    margin: -8px 0;
  }
  .tile.tiny .tile-icon { font-size: 36px; }
  .tile.tiny .tile-number { font-size: 11px; }
  .tile.tiny .tile-name { font-size: 12px; }

  /* Character */
  .character-area {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-45deg);
    z-index: 10;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .char {
    width: 48px; height: 48px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.15));
  }
  .char-head {
    width: 18px; height: 18px;
    background: #f1c40f; border-radius: 50%;
    border: 2px solid #e0b800;
  }
  .char-body {
    width: 4px; height: 14px;
    background: #f1c40f; border-radius: 2px;
    margin-top: -2px; position: relative;
  }
  .char-body::before, .char-body::after {
    content: ''; position: absolute;
    width: 3px; height: 10px;
    background: #f1c40f; border-radius: 2px;
  }
  .char-body::before { left: -8px; top: 2px; transform: rotate(-30deg); }
  .char-body::after { right: -8px; top: 2px; transform: rotate(30deg); }
  .char-legs { display: flex; gap: 6px; margin-top: -1px; }
  .char-legs span {
    width: 3px; height: 10px;
    background: #e67e22; border-radius: 2px;
  }
  .char-legs span:first-child { transform: rotate(-10deg); }
  .char-legs span:last-child { transform: rotate(10deg); }
  .char-name {
    position: absolute;
    top: -28px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px; font-weight: 700; color: #2c3e50;
    background: white; padding: 2px 10px; border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08); white-space: nowrap;
  }

  /* Connector */
  .connector {
    display: flex; flex-direction: column;
    align-items: center; position: relative; cursor: pointer;
  }
  .plus-btn {
    width: 32px; height: 32px;
    background: white; border: 2px dashed #bbb;
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    font-size: 18px; color: #999; cursor: pointer;
    margin: 2px 0; z-index: 5;
    transition: all 0.2s;
  }
  .plus-btn:hover { border-color: #3498db; color: #3498db; background: #ebf5fb; }
  .plus-btn.completed { border-color: #2ecc71; color: #2ecc71; background: #eafaf1; }

  .arrow-down {
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 20px solid #bdc3c7;
    margin: -2px 0; z-index: 2;
    transition: border-top-color 0.5s;
  }
  .arrow-down.completed { border-top-color: #2ecc71; }

  /* Modals */
  .achievement-overlay, .task-modal {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 100;
    justify-content: center; align-items: center;
  }
  .achievement-overlay.show, .task-modal.show { display: flex; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .achievement-card, .task-card {
    background: white; border-radius: 20px; padding: 30px 25px;
    max-width: 340px; width: 90%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .achievement-card .trophy { font-size: 56px; margin-bottom: 10px; }
  .achievement-card .ach-title { font-size: 20px; font-weight: 700; color: #2c3e50; margin-bottom: 4px; }
  .achievement-card .ach-desc { font-size: 14px; color: #7f8c8d; margin-bottom: 6px; }
  .achievement-card .ach-time { font-size: 11px; color: #bdc3c7; margin-bottom: 18px; }
  .achievement-card .ach-btn, .task-card .btn {
    background: linear-gradient(135deg, #3498db, #2980b9);
    color: white; border: none; border-radius: 25px; padding: 10px 30px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .achievement-card .ach-btn:hover, .task-card .btn:hover { transform: scale(1.05); }
  .task-card input, .task-card textarea {
    width: 100%; border: 2px solid #ddd; border-radius: 10px;
    padding: 10px 14px; font-size: 14px; margin-bottom: 12px;
    font-family: inherit; outline: none;
  }
  .task-card input:focus, .task-card textarea:focus { border-color: #3498db; }
  .task-card textarea { height: 80px; resize: vertical; }
  .task-card h3 { font-size: 18px; color: #2c3e50; margin-bottom: 15px; }

  /* Zoom wrapper */
  #zoomWrap {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden; touch-action: none; cursor: grab;
    background: #f5f0e8;
  }
  #zoomWrap.grabbing { cursor: grabbing; }
  #zoomContent {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    transform-origin: center center; will-change: transform;
  }
  .zoom-controls {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%); display: flex; gap: 8px;
    z-index: 50; background: rgba(255,255,255,.9);
    padding: 6px 12px; border-radius: 30px;
    box-shadow: 0 2px 12px rgba(0,0,0,.12);
  }
  .zoom-controls button {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid #ddd; background: white;
    font-size: 18px; cursor: pointer;
  }
  .zoom-controls button:active { transform: scale(.92); }
</style>
</head>
<body>
<div id="zoomWrap">
  <div id="zoomContent">
    <div class="game-board" id="gameBoard">
      <div class="title">🗺️ 創業旅程</div>
      <div class="subtitle">完成 Step 1 後，按 + 加入你嘅里程碑</div>
      <div class="path" id="path"></div>
    </div>
  </div>
  <div class="zoom-controls">
    <button onclick="zoomOut()">−</button>
    <button onclick="resetView()">⟲</button>
    <button onclick="zoomIn()">+</button>
  </div>
</div>

<!-- Achievement -->
<div class="achievement-overlay" id="achPopup">
  <div class="achievement-card">
    <div class="trophy" id="achIcon">🏆</div>
    <div class="ach-title" id="achTitle">成就解鎖！</div>
    <div class="ach-desc" id="achDesc"></div>
    <div class="ach-time" id="achTime"></div>
    <button class="ach-btn" onclick="closeAch()">🎉 繼續</button>
  </div>
</div>

<!-- Add custom modal -->
<div class="task-modal" id="addModal">
  <div class="task-card">
    <h3>➕ 加入新里程碑</h3>
    <input id="addName" placeholder="里程碑名（例如：市場研究）">
    <textarea id="addDesc" placeholder="簡單描述（選擇性）"></textarea>
    <button class="btn" onclick="submitAdd()">✅ 加入</button>
    <button class="btn" style="background:#ecf0f1;color:#7f8c8d;margin-top:6px" onclick="closeAdd()">✖️ 取消</button>
  </div>
</div>

<script>
function closeAdd() { document.getElementById('addModal').classList.remove('show'); }
// ===== DATA =====
const steps = [
  { icon: '💠', name: '創立 Project', desc: '開始你嘅創業旅程' }
];
let curStep = 0; // 0 = not started
let customSteps = []; // { icon, name, desc, completed, side: 'left'|'right'|'bottom'|'top', afterStep: 0 }
let branchCounts = { left: 0, right: 0, bottom: 0, top: 0 };
let userName = '';

// ===== RENDER =====
function render() {
  const path = document.getElementById('path');
  let html = '';
  let allItems = [];

  // Build all items: preset steps + custom steps interleaved
  for (let i = 0; i < steps.length; i++) {
    if (i > 0) {
      // + button between preset steps
      allItems.push({ type: 'plus', after: i - 1 });
    }
    allItems.push({ type: 'preset', index: i });
    // custom steps inserted after this preset
    const after = customSteps.filter(c => c.afterPreset === i);
    after.forEach((c, ci) => {
      allItems.push({ type: 'custom', data: c });
      if (ci < after.length - 1) {
        allItems.push({ type: 'plus', afterPreset: i, customIndex: ci });
      }
    });
    // Only show + after step 1 if we're past it
    if (i === 0 && curStep > 0) {
      const hasCustomAt0 = customSteps.filter(c => c.afterPreset === 0);
      allItems.push({ type: 'plus', after: 0 });
    }
  }

  // Add + after last item
  const lastPreset = steps.length - 1;
  const customAfterLast = customSteps.filter(c => c.afterPreset === lastPreset);
  if (customAfterLast.length > 0) {
    allItems.push({ type: 'plus', after: lastPreset });
  } else if (curStep > lastPreset) {
    allItems.push({ type: 'plus', after: lastPreset });
  }

  let completedCustomCount = 0;
  let totalCount = 0;

  allItems.forEach((item, idx) => {
    if (item.type === 'plus') {
      const alreadyAdded = customSteps.some(c => c.afterPreset === (item.after !== undefined ? item.after : (curStep - 1)));
      html += `<div class="connector"><div class="plus-btn ${alreadyAdded ? 'completed' : ''}" onclick="openAddModal()">+</div></div>`;
    } else if (item.type === 'preset') {
      const i = item.index;
      const isCur = i === curStep;
      const isDone = i < curStep;
      const isStart = i === 0 && curStep === 0;
      
      let cls = 'tile';
      if (isStart) cls += ' start';
      else if (isDone) cls += ' completed';
      else if (isCur) cls += ' current';

      let inner = `
        <div class="tile-inner">
          <div class="tile-icon">${isDone ? '✅' : steps[i].icon}</div>
          <div class="tile-number">Step ${i+1}</div>
          <div class="tile-name">${steps[i].name}</div>
          ${steps[i].desc ? `<div style="font-size:9px;opacity:0.7;margin-top:4px">${steps[i].desc}</div>` : ''}
        </div>`;

      // Side + buttons for this preset (placed at 4 diamond corners)
      const hasL = customSteps.some(c => c.side === 'left' && c.afterStep === i);
      const hasR = customSteps.some(c => c.side === 'right' && c.afterStep === i);
      const hasT = customSteps.some(c => c.side === 'top' && c.afterStep === i);
      const hasB = customSteps.some(c => c.side === 'bottom' && c.afterStep === i);
      inner += `<div class="side-plus ${hasL?'always-show':''}" style="left:-14px;top:-14px;" onclick="event.stopPropagation();openAddModal(${i},'left')">${hasL?'↖':'+'}</div>`;
      inner += `<div class="side-plus ${hasT?'always-show':''}" style="left:calc(100% - 14px);top:-14px;" onclick="event.stopPropagation();openAddModal(${i},'top')">${hasT?'↗':'+'}</div>`;
      inner += `<div class="side-plus ${hasR?'always-show':''}" style="left:calc(100% - 14px);top:calc(100% - 14px);" onclick="event.stopPropagation();openAddModal(${i},'right')">${hasR?'↘':'+'}</div>`;
      inner += `<div class="side-plus ${hasB?'always-show':''}" style="left:-14px;top:calc(100% - 14px);" onclick="event.stopPropagation();openAddModal(${i},'bottom')">${hasB?'↙':'+'}</div>`;

      // Character on current preset
      if (isCur && curStep > 0) {
        inner += `<div class="character-area"><div class="char">
          <div class="char-name">${userName || '你'}</div>
          <div class="char-head"></div><div class="char-body"></div>
          <div class="char-legs"><span></span><span></span></div>
        </div></div>`;
      }

      html += `<div class="tile-wrap"><div class="${cls}" onclick="${isStart ? `startJourney()` : isCur ? `completePreset(${i})` : ''}">${inner}</div></div>`;
      if (isStart) totalCount++;
      else if (isCur) { totalCount++; totalCount++; } // current + future
      else totalCount++;

    } else if (item.type === 'custom') {
      const c = item.data;
      const isCur = curStep === steps.length + customSteps.filter(x => x.completed).length;
      const isDone = c.completed;
      
      // Calculate if this is the current active custom tile
      const doneCustoms = customSteps.filter(x => x.completed).length;
      const curAll = steps.length + doneCustoms;
      const thisIdx = steps.length + customSteps.indexOf(c);
      const isActive = !c.completed && (thisIdx === curAll || (curStep >= steps.length && !isDone && customSteps.indexOf(c) === doneCustoms));

      let cls = 'tile custom';
      if (isDone) cls += ' completed';
      else if (isActive) cls += ' current';

      let inner = `<div class="tile-inner">
        <div class="tile-icon">${isDone ? '✅' : c.icon}</div>
        <div class="tile-name">${c.name}</div>
      </div>`;

      if (isActive) {
        inner += `<div class="character-area"><div class="char">
          <div class="char-name">${userName || '你'}</div>
          <div class="char-head"></div><div class="char-body"></div>
          <div class="char-legs"><span></span><span></span></div>
        </div></div>`;
      }

      // Corner + buttons for custom tile too
      const pi = c.afterStep !== undefined ? c.afterStep : 0;
      const cHasL = customSteps.some(x => x.side === 'left' && x.afterStep === pi && customSteps.indexOf(x) > customSteps.indexOf(c) && x.afterPreset === pi);
      const cHasT = customSteps.some(x => x.side === 'top' && x.afterStep === pi && customSteps.indexOf(x) > customSteps.indexOf(c) && x.afterPreset === pi);
      const cHasR = customSteps.some(x => x.side === 'right' && x.afterStep === pi && customSteps.indexOf(x) > customSteps.indexOf(c) && x.afterPreset === pi);
      const cHasB = customSteps.some(x => x.side === 'bottom' && x.afterStep === pi && customSteps.indexOf(x) > customSteps.indexOf(c) && x.afterPreset === pi);
      inner += `<div class="side-plus ${cHasL?'always-show':''}" style="left:-14px;top:-14px;" onclick="event.stopPropagation();openAddModal(${pi},'left')">${cHasL?'↖':'+'}</div>`;
      inner += `<div class="side-plus ${cHasT?'always-show':''}" style="left:calc(100% - 14px);top:-14px;" onclick="event.stopPropagation();openAddModal(${pi},'top')">${cHasT?'↗':'+'}</div>`;
      inner += `<div class="side-plus ${cHasR?'always-show':''}" style="left:calc(100% - 14px);top:calc(100% - 14px);" onclick="event.stopPropagation();openAddModal(${pi},'right')">${cHasR?'↘':'+'}</div>`;
      inner += `<div class="side-plus ${cHasB?'always-show':''}" style="left:-14px;top:calc(100% - 14px);" onclick="event.stopPropagation();openAddModal(${pi},'bottom')">${cHasB?'↙':'+'}</div>`;

      // Connector arrow from parent diamond
      const sideLabel = {left:'←',top:'↑',right:'→',bottom:'↓'}[c.side] || '▼';
      html += `<div class="connector"><div class="arrow-down ${isDone?'completed':''} branch-connector" style="position:relative;"><span style="position:absolute;left:50%;top:-18px;transform:translateX(-50%);font-size:10px;color:#999;white-space:nowrap;">${sideLabel}</span></div></div>`;
      html += `<div class="tile-wrap"><div class="${cls}" onclick="${isActive ? `completeCustom(${customSteps.indexOf(c)})` : ''}">${inner}</div></div>`;
      if (isDone) { completedCustomCount++; totalCount++; }
    }
  });

  path.innerHTML = html;
}

// ===== ACTIONS =====
function startJourney() {
  const name = prompt('✏️ 你叫咩名？', userName || '');
  if (name === null) return;
  userName = name || '創業者';
  curStep = 1;
  render();
}

function completePreset(i) {
  if (i !== curStep) return;
  curStep++;
  const now = new Date();
  showAch(steps[i].name, steps[i].desc, now);
  render();
}

function openAddModal(afterStep, side) {
  window._addAfter = afterStep;
  window._addSide = side;
  document.getElementById('addName').value = '';
  document.getElementById('addDesc').value = '';
  document.getElementById('addModal').classList.add('show');
}

function submitAdd() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { alert('請輸入里程碑名 ✏️'); return; }
  const desc = document.getElementById('addDesc').value.trim() || '';
  const icons = ['🌟','⭐','💫','✨','🎯','📌','💎','🔥','💪','🎪','📊','🎨','⚙️','📋','🔄'];
  const icon = icons[customSteps.length % icons.length];
  // If no side specified (from between-tile +), default to 'bottom' and use last preset index
  const addSide = window._addSide || 'bottom';
  const addAfter = window._addAfter !== undefined ? window._addAfter : (steps.length - 1);
  customSteps.push({ icon, name, desc, completed: false, side: addSide, afterStep: addAfter, afterPreset: addAfter });
  document.getElementById('addModal').classList.remove('show');
  render();
}

function completeCustom(idx) {
  const c = customSteps[idx];
  if (c.completed) return;
  c.completed = true;
  const now = new Date();
  showAch(c.name, c.desc, now);
  render();
}

function showAch(name, desc, date) {
  document.getElementById('achIcon').textContent = '🏆';
  document.getElementById('achTitle').textContent = `「${name}」完成！`;
  document.getElementById('achDesc').textContent = desc || '里程碑達成！';
  document.getElementById('achTime').textContent = `⏱️ ${date.toLocaleString('zh-Hant', { timeZone: 'Asia/Hong_Kong' })}`;
  document.getElementById('achPopup').classList.add('show');
}

function closeAch() {
  document.getElementById('achPopup').classList.remove('show');
}

// ===== ZOOM =====
const zw = document.getElementById('zoomWrap');
const zc = document.getElementById('zoomContent');
let scale = 1, px = 0, py = 0, pan = false, sx = 0, sy = 0, ld = 0, ss = 1, spx = 0, spy = 0;

function apply() { zc.style.transform = `translate(${px}px, ${py}px) scale(${scale})`; }
function resetView() { scale = 1; px = 0; py = 0; apply(); }

function zoomIn() {
  const ns = Math.min(scale * 1.4, 5);
  px = window.innerWidth/2 - (window.innerWidth/2 - px) * (ns / scale);
  py = window.innerHeight/2 - (window.innerHeight/2 - py) * (ns / scale);
  scale = ns; apply();
}
function zoomOut() {
  const ns = Math.max(scale / 1.4, 0.3);
  px = window.innerWidth/2 - (window.innerWidth/2 - px) * (ns / scale);
  py = window.innerHeight/2 - (window.innerHeight/2 - py) * (ns / scale);
  scale = ns; apply();
}

zw.addEventListener('wheel', e => {
  e.preventDefault();
  const r = zw.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const d = e.deltaY > 0 ? 0.9 : 1.1;
  const ns = Math.max(0.3, Math.min(5, scale * d));
  px = mx - (mx - px) * (ns / scale);
  py = my - (my - py) * (ns / scale);
  scale = ns; apply();
}, { passive: false });

zw.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { pan = true; sx = e.touches[0].clientX - px; sy = e.touches[0].clientY - py; }
  else if (e.touches.length === 2) { pan = false; ld = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); ss = scale; spx = px; spy = py; }
}, { passive: false });
zw.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && pan) { px = e.touches[0].clientX - sx; py = e.touches[0].clientY - sy; apply(); }
  else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    scale = Math.max(0.3, Math.min(5, ss * (d / ld))); px = spx; py = spy; apply();
  }
}, { passive: false });
zw.addEventListener('touchend', () => { pan = false; }, { passive: false });
zw.addEventListener('mousedown', e => { pan = true; sx = e.clientX - px; sy = e.clientY - py; zw.classList.add('grabbing'); });
zw.addEventListener('mousemove', e => { if (!pan) return; px = e.clientX - sx; py = e.clientY - sy; apply(); });
zw.addEventListener('mouseup', () => { pan = false; zw.classList.remove('grabbing'); });
zw.addEventListener('mouseleave', () => { pan = false; zw.classList.remove('grabbing'); });

render();
</script>
</body>
</html>
