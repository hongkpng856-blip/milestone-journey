<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>菱形旅程</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f0e8;font-family:'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.game-board{max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;position:relative}
.title{font-size:24px;font-weight:700;color:#2c3e50;margin-bottom:6px}
.subtitle{font-size:13px;color:#95a5a6;margin-bottom:30px}
.path{display:flex;flex-direction:column;align-items:center;gap:0;width:100%;position:relative;padding:10px 0}
.tile-wrap{display:flex;flex-direction:column;align-items:center;position:relative;width:100%;margin:-8px 0}
.tile{width:180px;height:180px;transform:rotate(45deg);border-radius:16px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .6s cubic-bezier(.34,1.56,.64,1);cursor:pointer;border:3px solid;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.tile-inner{transform:rotate(-45deg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;width:100%;height:100%;padding:10px}
.tile.start{background:linear-gradient(135deg,#fff5e6,#ffe0b2);border-color:#f39c12}
.tile.start .tile-inner{color:#e67e22}
.tile.custom{background:linear-gradient(135deg,#f0e6ff,#e0ccff);border-color:#9b59b6}
.tile.custom .tile-inner{color:#8e44ad}
.tile.completed{background:linear-gradient(135deg,#eafaf1,#d5f5e3);border-color:#2ecc71}
.tile.completed .tile-inner{color:#27ae60}
.tile.current{background:linear-gradient(135deg,#ebf5fb,#d6eaf8);border-color:#3498db;animation:pulse 2s ease-in-out infinite}
.tile.current .tile-inner{color:#2980b9}
@keyframes pulse{0%,100%{box-shadow:0 4px 15px rgba(52,152,219,.15)}50%{box-shadow:0 4px 25px rgba(52,152,219,.35)}}
.tile-icon{font-size:36px;margin-bottom:4px}
.tile-number{font-size:11px;font-weight:700;opacity:.6}
.tile-name{font-size:12px;font-weight:600;margin-top:2px}
.tile-desc{font-size:9px;opacity:.7;margin-top:4px}

/* Character */
.character-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-45deg);z-index:10}
.char{width:48px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;filter:drop-shadow(0 3px 8px rgba(0,0,0,.15))}
.char-head{width:18px;height:18px;background:#f1c40f;border-radius:50%;border:2px solid #e0b800}
.char-body{width:4px;height:14px;background:#f1c40f;border-radius:2px;margin-top:-2px;position:relative}
.char-body::before,.char-body::after{content:'';position:absolute;width:3px;height:10px;background:#f1c40f;border-radius:2px}
.char-body::before{left:-8px;top:2px;transform:rotate(-30deg)}
.char-body::after{right:-8px;top:2px;transform:rotate(30deg)}
.char-legs{display:flex;gap:6px;margin-top:-1px}
.char-legs span{width:3px;height:10px;background:#e67e22;border-radius:2px}
.char-legs span:first-child{transform:rotate(-10deg)}
.char-legs span:last-child{transform:rotate(10deg)}
.char-name{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;color:#2c3e50;background:white;padding:2px 10px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);white-space:nowrap}

/* Corner + buttons at diamond tips */
.corner-plus{position:absolute;z-index:20;width:32px;height:32px;background:white;border:2px dashed #bbb;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#999;cursor:pointer;transition:all .2s}
.corner-plus:hover{border-color:#3498db;color:#3498db;background:#ebf5fb}
.corner-plus.added{border-color:#2ecc71;color:#2ecc71;background:#eafaf1;cursor:default}

/* Connector arrow */
.arrow-down{width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:20px solid #bdc3c7;margin:-2px 0;z-index:2}
.arrow-down.completed{border-top-color:#2ecc71}

/* Branch tile (same size) */
.branch-wrap{position:absolute;z-index:5}
.branch-wrap .tile{width:180px;height:180px}

/* Modals */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center}
.overlay.show{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card{background:white;border-radius:20px;padding:30px 25px;max-width:340px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .5s cubic-bezier(.34,1.56,.64,1);position:relative}
@keyframes popIn{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.card .close-btn{position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;color:#bbb;cursor:pointer;padding:4px;line-height:1}
.card .close-btn:hover{color:#666}
.card h3{font-size:18px;color:#2c3e50;margin-bottom:15px}
.card input,.card textarea{width:100%;border:2px solid #ddd;border-radius:10px;padding:10px 14px;font-size:14px;margin-bottom:12px;font-family:inherit;outline:none}
.card input:focus,.card textarea:focus{border-color:#3498db}
.card textarea{height:80px;resize:vertical}
.card .btn{background:linear-gradient(135deg,#3498db,#2980b9);color:white;border:none;border-radius:25px;padding:10px 30px;font-size:15px;font-weight:600;cursor:pointer}
.card .ach-icon{font-size:56px;margin-bottom:10px}
.card .ach-title{font-size:20px;font-weight:700;color:#2c3e50;margin-bottom:4px}
.card .ach-desc{font-size:14px;color:#7f8c8d;margin-bottom:6px}
.card .ach-time{font-size:11px;color:#bdc3c7;margin-bottom:18px}

/* Zoom */
#zoomWrap{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;touch-action:none;cursor:grab;background:#f5f0e8}
#zoomWrap.grabbing{cursor:grabbing}
#zoomContent{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;justify-content:center;align-items:center;transform-origin:center center;will-change:transform}
.zoom-controls{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:50;background:rgba(255,255,255,.9);padding:6px 12px;border-radius:30px;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.zoom-controls button{width:40px;height:40px;border-radius:50%;border:1px solid #ddd;background:white;font-size:18px;cursor:pointer}
.zoom-controls button:active{transform:scale(.92)}
</style>
</head>
<body>
<div id="zoomWrap">
  <div id="zoomContent">
    <div class="game-board" id="gameBoard">
      <div class="title">🗺️ 創業旅程</div>
      <div class="subtitle">完成 Step 1 後，按 + 加入分支里程碑</div>
      <div class="path" id="path"></div>
    </div>
  </div>
  <div class="zoom-controls">
    <button onclick="zoomOut()">−</button>
    <button onclick="resetView()">⟲</button>
    <button onclick="zoomIn()">+</button>
  </div>
</div>

<!-- Achievement -->
<div class="overlay" id="achPopup">
  <div class="card">
    <div class="ach-icon" id="achIcon">🏆</div>
    <div class="ach-title" id="achTitle">成就解鎖！</div>
    <div class="ach-desc" id="achDesc"></div>
    <div class="ach-time" id="achTime"></div>
    <button class="btn" onclick="closeAch()">🎉 繼續</button>
  </div>
</div>

<!-- Add custom modal -->
<div class="overlay" id="addModal">
  <div class="card">
    <button class="close-btn" onclick="closeAdd()">✕</button>
    <h3>➕ 加入新里程碑</h3>
    <input id="addName" placeholder="里程碑名（例如：市場研究）">
    <textarea id="addDesc" placeholder="簡單描述（選擇性）"></textarea>
    <button class="btn" onclick="submitAdd()">✅ 加入</button>
  </div>
</div>

<script>
// ===== DATA =====
const steps = [{ icon: '💠', name: '創立 Project', desc: '開始你嘅創業旅程' }];
let curStep = 0;
let customSteps = []; // { icon, name, desc, completed, side, afterIdx }
let userName = '';

// ===== RENDER =====
function render() {
  const path = document.getElementById('path');
  let html = '';

  // Diamond tip offsets (180px rotated 45° → tip at ~127px from center)
  const TIP = 127;
  const BTN_OFF = 20; // + button beyond the tip

  steps.forEach((step, i) => {
    const isStart = i === 0 && curStep === 0;
    const isDone = i < curStep;
    const isCur = i === curStep && curStep > 0;

    let cls = 'tile';
    if (isStart) cls += ' start';
    else if (isDone) cls += ' completed';
    else if (isCur) cls += ' current';

    // Character on current tile
    let charHtml = '';
    if (isCur || isStart) {
      charHtml = `<div class="character-area"><div class="char">
        <div class="char-name">${userName || '你'}</div>
        <div class="char-head"></div><div class="char-body"></div>
        <div class="char-legs"><span></span><span></span></div>
      </div></div>`;
    }

    // Corner + buttons at 4 diamond tips
    let btns = '';
    ['top','right','bottom','left'].forEach(side => {
      const hasBranch = customSteps.some(c => c.afterIdx === i && c.side === side);
      let l = 0, t = 0;
      if (side === 'top')    { l = 50; t = -(TIP + BTN_OFF); }
      if (side === 'right')  { l = 50 + TIP + BTN_OFF; t = 50; }
      if (side === 'bottom') { l = 50; t = 50 + TIP + BTN_OFF; }
      if (side === 'left')   { l = -(TIP + BTN_OFF); t = 50; }
      btns += `<div class="corner-plus${hasBranch?' added':''}" style="left:calc(50% + ${l}px);top:calc(50% + ${t}px);margin-left:-16px;margin-top:-16px" onclick="event.stopPropagation();${hasBranch?'':`openAddModal(${i},'${side}')`}">${hasBranch?'✓':'+'}</div>`;
    });

    // Branch tiles at 4 sides (same size: 180x180)
    let branchesHtml = '';
    ['top','right','bottom','left'].forEach(side => {
      const sideBranches = customSteps.filter(c => c.afterIdx === i && c.side === side);
      sideBranches.forEach(c => {
        const idx = customSteps.indexOf(c);
        const cDone = c.completed;
        // Determine if this branch is the current active one
        const totalDone = completedCount();
        const thisGlobalIdx = 1 + customSteps.findIndex(x => x === c);
        const cActive = !cDone && thisGlobalIdx === totalDone;
        
        // Position branch tile centered on that side
        const BW = 180;
        let bx = 0, by = 0;
        if (side === 'top')    { bx = -BW/2; by = -(TIP*2 + BTN_OFF + 30 + BW/2); }
        if (side === 'right')  { bx = TIP*2 + BTN_OFF + 30; by = -BW/2; }
        if (side === 'bottom') { bx = -BW/2; by = TIP*2 + BTN_OFF + 30; }
        if (side === 'left')   { bx = -(TIP*2 + BTN_OFF + 30 + BW); by = -BW/2; }

        let bCls = 'tile custom';
        if (cDone) bCls += ' completed';
        else if (cActive) bCls += ' current';

        let bChar = '';
        if (cActive) {
          bChar = `<div class="character-area"><div class="char">
            <div class="char-name">${userName || '你'}</div>
            <div class="char-head"></div><div class="char-body"></div>
            <div class="char-legs"><span></span><span></span></div>
          </div></div>`;
        }

        branchesHtml += `<div class="branch-wrap" style="left:calc(50% + ${bx}px);top:calc(50% + ${by}px);width:180px;height:180px">
          <div class="${bCls}" onclick="${cActive?`completeCustom(${idx})`:''}">
            <div class="tile-inner">
              <div class="tile-icon">${cDone?'✅':c.icon}</div>
              <div class="tile-name">${c.name}</div>
              ${c.desc?`<div class="tile-desc">${c.desc}</div>`:''}
            </div>
            ${bChar}
          </div>
        </div>`;
      });
    });

    html += `<div class="tile-wrap" style="position:relative;padding:${TIP*2+BTN_OFF+200}px 0">
      <div class="${cls}" onclick="${isStart?`startJourney()`:isCur?`completePreset(${i})`:''}">
        <div class="tile-inner">
          <div class="tile-icon">${isDone?'✅':step.icon}</div>
          <div class="tile-number">Step ${i+1}</div>
          <div class="tile-name">${step.name}</div>
          ${step.desc?`<div class="tile-desc">${step.desc}</div>`:''}
        </div>
        ${charHtml}
      </div>
      ${btns}
      ${branchesHtml}
    </div>`;
  });

  path.innerHTML = html;
}

function completedCount() {
  return (curStep > 0 ? 1 : 0) + customSteps.filter(c => c.completed).length;
}

// ===== ACTIONS =====
function startJourney() {
  const name = prompt('✏️ 你叫咩名？', userName || '');
  if (name === null) return;
  userName = name || '創業者';
  curStep = 1;
  render();
}

function completePreset(i) {
  if (i !== curStep) return;
  curStep++;
  const now = new Date();
  showAch(steps[i].name, steps[i].desc, now);
  render();
}

function openAddModal(after, side) {
  window._addAfter = after;
  window._addSide = side;
  document.getElementById('addName').value = '';
  document.getElementById('addDesc').value = '';
  document.getElementById('addModal').classList.add('show');
}

function closeAdd() {
  document.getElementById('addModal').classList.remove('show');
}

function submitAdd() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { alert('請輸入里程碑名 ✏️'); return; }
  const desc = document.getElementById('addDesc').value.trim() || '';
  const icons = ['🌟','⭐','💫','✨','🎯','📌','💎','🔥','💪','🎪','📊','🎨','⚙️','📋','🔄'];
  const icon = icons[customSteps.length % icons.length];
  customSteps.push({ icon, name, desc, completed: false, side: window._addSide || 'bottom', afterIdx: window._addAfter || 0 });
  document.getElementById('addModal').classList.remove('show');
  render();
}

function completeCustom(idx) {
  const c = customSteps[idx];
  if (c.completed) return;
  c.completed = true;
  const now = new Date();
  showAch(c.name, c.desc, now);
  render();
}

function showAch(name, desc, date) {
  document.getElementById('achIcon').textContent = '🏆';
  document.getElementById('achTitle').textContent = `「${name}」完成！`;
  document.getElementById('achDesc').textContent = desc || '里程碑達成！';
  document.getElementById('achTime').textContent = `⏱️ ${date.toLocaleString('zh-Hant', { timeZone: 'Asia/Hong_Kong' })}`;
  document.getElementById('achPopup').classList.add('show');
}

function closeAch() {
  document.getElementById('achPopup').classList.remove('show');
}

// ===== ZOOM =====
const zw = document.getElementById('zoomWrap');
const zc = document.getElementById('zoomContent');
let scale = 1, px = 0, py = 0, pan = false, sx = 0, sy = 0, ld = 0, ss = 1, spx = 0, spy = 0;

function apply() { zc.style.transform = `translate(${px}px, ${py}px) scale(${scale})`; }
function resetView() { scale = 1; px = 0; py = 0; apply(); }

function zoomIn() {
  const ns = Math.min(scale * 1.4, 5);
  px = window.innerWidth/2 - (window.innerWidth/2 - px) * (ns / scale);
  py = window.innerHeight/2 - (window.innerHeight/2 - py) * (ns / scale);
  scale = ns; apply();
}
function zoomOut() {
  const ns = Math.max(scale / 1.4, 0.3);
  px = window.innerWidth/2 - (window.innerWidth/2 - px) * (ns / scale);
  py = window.innerHeight/2 - (window.innerHeight/2 - py) * (ns / scale);
  scale = ns; apply();
}

zw.addEventListener('wheel', e => {
  e.preventDefault();
  const r = zw.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const d = e.deltaY > 0 ? 0.9 : 1.1;
  const ns = Math.max(0.3, Math.min(5, scale * d));
  px = mx - (mx - px) * (ns / scale);
  py = my - (my - py) * (ns / scale);
  scale = ns; apply();
}, { passive: false });

zw.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { pan = true; sx = e.touches[0].clientX - px; sy = e.touches[0].clientY - py; }
  else if (e.touches.length === 2) { pan = false; ld = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); ss = scale; spx = px; spy = py; }
}, { passive: false });
zw.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && pan) { px = e.touches[0].clientX - sx; py = e.touches[0].clientY - sy; apply(); }
  else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    scale = Math.max(0.3, Math.min(5, ss * (d / ld))); px = spx; py = spy; apply();
  }
}, { passive: false });
zw.addEventListener('touchend', () => { pan = false; }, { passive: false });
zw.addEventListener('mousedown', e => { pan = true; sx = e.clientX - px; sy = e.clientY - py; zw.classList.add('grabbing'); });
zw.addEventListener('mousemove', e => { if (!pan) return; px = e.clientX - sx; py = e.clientY - sy; apply(); });
zw.addEventListener('mouseup', () => { pan = false; zw.classList.remove('grabbing'); });
zw.addEventListener('mouseleave', () => { pan = false; zw.classList.remove('grabbing'); });

render();
</script>
</body>
</html>
